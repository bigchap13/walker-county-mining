<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Walker County Mining-Linked Communities Map</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
  <header class="topbar">
    <a class="circle linkcircle" href="/">‹</a>
    <strong>Mining-Linked Communities Map</strong>
    <button class="circle" id="fitBtn">⌖</button>
  </header>

  <main>
    <section class="hero map-hero">
      <p class="eyebrow">Walker County Mining</p>
      <h1>Mining-Linked Communities Map</h1>
      <p>Mining-linked communities plotted from Atlas coordinates. This is not the mine-location layer.</p>
    </section>

    <section class="map-shell">
      <div id="mineMap"></div>
    </section>

    <section class="card">
      <span>Mapped Records</span>
      <h2 id="pointCount">Loading...</h2>
      <p id="mapNote">Pulling coordinate-backed mining-linked records from the Walker County Atlas and Almanac.</p>
      <div id="pointList"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/js/mining_map.js"></script>
</body>
</html>
