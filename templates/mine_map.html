<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alabama Mine Map</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
</head>
<body>
  <header class="topbar">
    <a class="circle linkcircle" href="/">‹</a>
    <strong>Alabama Mine Map</strong>
    <button class="circle" id="fitBtn">⌖</button>
  </header>

  <main>
    <section class="hero map-hero">
      <p class="eyebrow">Exact mine locations</p>
      <h1>Alabama Mine Map</h1>
      <p>Clustered source-backed Alabama mine records. Zoom in to separate individual mines.</p>
    </section>

    <section class="card map-controls">
      <input id="mineSearch" type="search" placeholder="Search mine, operator, county...">
      <select id="countyFilter"></select>
      <select id="statusFilter"></select>
      <select id="typeFilter"></select>
    </section>

    <section class="map-shell">
      <div id="mineMap"></div>
    </section>

    <section class="card">
      <span>Mine Records</span>
      <h2 id="mineCount">Checking...</h2>
      <p id="mineNote">Loading exact mine-location records.</p>
      <div class="legend">
        <span><b class="dot active"></b>Active</span>
        <span><b class="dot nonproducing"></b>NonProducing</span>
        <span><b class="dot abandoned"></b>Abandoned</span>
        <span><b class="dot unknown"></b>Other</span>
      </div>
      <div id="mineList"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="/static/js/mine_map.js"></script>
</body>
</html>
